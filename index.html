const ORDER = ["assoc","ems","med","intl","db","kol","tccc"];
const CATS = [
  {s:"all",  l:"全部"},
  {s:"assoc",l:"台灣協會"},
  {s:"ems",  l:"台灣急救社群"},
  {s:"med",  l:"台灣學會"},
  {s:"intl", l:"國際期刊/組織"},
  {s:"db",   l:"資料庫/媒體"},
  {s:"kol",  l:"資訊KOL"},
  {s:"tccc", l:"戰術救護"}
];

let AF = "all";

function buildCatGrid() {
  const g = document.getElementById("cat-grid");
  g.innerHTML = CATS.map(x => {
    const n = x.s === "all" ? D.length : D.filter(d => d.s === x.s).length;
    const on = x.s === AF ? " on" : "";
    return `<button class="ft${on}" onclick="sf('${x.s}',this)"><span class="ft-num">${n}</span><span class="ft-lbl">${x.l}</span></button>`;
  }).join("");
}

function sf(k, b) {
  AF = k;
  document.querySelectorAll(".ft").forEach(x => x.classList.remove("on"));
  b.classList.add("on");
  render();
}

function render() {
  const q = document.getElementById("q").value.toLowerCase().trim();
  const mc = document.getElementById("mc");
  const nr = document.getElementById("nr");
  mc.innerHTML = "";
  let tot = 0;
  const map = {};
  D.forEach(d => {
    if (AF !== "all" && d.s !== AF) return;
    if (q && !d.n.toLowerCase().includes(q) && !d.d.toLowerCase().includes(q)) return;
    if (!map[d.s]) map[d.s] = { l: d.l, items: [] };
    map[d.s].items.push(d);
    tot++;
  });
  ORDER.forEach(k => {
    const g = map[k];
    if (!g) return;
    const w = document.createElement("div");
    w.className = "sec";
    const t = document.createElement("div");
    t.className = "sec-title";
    t.textContent = g.l;
    w.appendChild(t);
    const gr = document.createElement("div");
    gr.className = "grid";
    g.items.forEach(d => {
      const c = document.createElement("div");
      c.className = "card";
      const ls = [];
      if (d.url) ls.push(`<a class="lp" href="${d.url}" target="_blank" rel="noopener">🌐 官網</a>`);
      if (d.fb)  ls.push(`<a class="lp" href="${d.fb}"  target="_blank" rel="noopener">👍 FB</a>`);
      c.innerHTML = `<div class="ctop"><span class="cico">${d.ico||"📌"}</span><div class="links">${ls.join("")}</div></div><div class="cn">${d.n}</div><div class="cd">${d.d}</div><span class="tag ${d.c}">${d.t}</span>`;
      gr.appendChild(c);
    });
    w.appendChild(gr);
    mc.appendChild(w);
  });
  document.getElementById("hd-count").textContent = `共 ${tot} 筆`;
  nr.style.display = tot ? "none" : "block";
  mc.style.display = tot ? "block" : "none";
}

buildCatGrid();
render();
</script>
